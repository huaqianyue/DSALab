<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>DSALab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
  <body>
    <div id="app">
      <!-- Minimalist Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-top">
           <!-- Logo removed to avoid overlapping with window controls -->
        </div>
        
        <nav class="sidebar-nav">
          <button id="runBtn" class="sidebar-btn" data-tooltip="Run (Ctrl+R)">
            <i class="fas fa-play"></i>
          </button>
          <div class="sidebar-divider"></div>
          <button id="clearBtn" class="sidebar-btn" data-tooltip="Clear Output (Ctrl+K)">
            <i class="fas fa-trash"></i>
          </button>
        </nav>
        
        <div class="sidebar-bottom">
           <button id="settingsBtn" class="sidebar-btn" data-tooltip="Settings">
             <i class="fas fa-cog"></i>
           </button>
        </div>
      </aside>
        
      <!-- Main Content -->
      <main class="main-content">
        <!-- Tabs Bar -->
        <div class="tabs-bar">
          <div class="tabs-list">
            <div class="tab active" data-tab-id="tab-1">
              <span class="tab-title">Untitled-1</span>
              <!-- <button class="tab-close" data-tooltip="Close Tab">
                <i class="fas fa-times"></i>
              </button> -->
            </div>
          </div>
          <!-- <button class="add-tab-btn" data-tooltip="New Tab (Ctrl+T)">
            <i class="fas fa-plus"></i>
          </button> -->
        </div>
        
        <!-- Tab Content -->
        <div class="tabs-content">
          <div class="tab-pane active" data-tab-id="tab-1">
            <div class="split-view">
              <div class="split-panel editor-panel">
                <div class="editor-container" data-tab-id="tab-1"></div>
              </div>
              
              <div class="split-divider"></div>
              
              <div class="split-panel output-panel">
                <div class="output-container" data-tab-id="tab-1"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Settings Panel (outside app) -->
    <div id="settingsPanel" class="settings-panel">
      <div class="settings-modal">
        <div class="settings-header">
          <h3>Settings</h3>
          <button id="closeSettingsBtn" class="close-settings-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="settings-modal-content">
          <div class="settings-content">
            <div class="settings-section">
              <h4>General</h4>
              <div class="setting-item">
                <label>Language:</label>
                <select id="language-select">
                  <option value="en">English</option>
                  <option value="zh">简体中文</option>
                </select>
              </div>
            </div>
            
            <div class="settings-section">
              <h4>Appearance</h4>
              <div class="setting-item">
                <label>Theme:</label>
                <select id="theme-select">
                  <option value="github-dark">GitHub Dark</option>
                  <option value="tomorrow-night-bright">Tomorrow Night Bright</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Font:</label>
                <select id="font-family-select">
                  <option value="JetBrains Mono">JetBrains Mono</option>
                  <option value="Fira Code">Fira Code</option>
                  <option value="Consolas">Consolas</option>
                  <option value="Monaco">Monaco</option>
                  <option value="Menlo">Menlo</option>
                </select>
              </div>
              <div class="setting-item">
                <label>Font Size:</label>
                <input type="range" id="font-size-input" min="10" max="24" value="14">
                <span id="font-size-value">14px</span>
              </div>
            </div>
            
            <div class="settings-section">
              <h4>Editor</h4>
              <div class="setting-item">
                <label>
                  <input type="checkbox" id="word-wrap-toggle" checked>
                  Word Wrap
                </label>
              </div>
              <div class="setting-item">
               <label>
                 <input type="checkbox" id="minimap-toggle">
                 Show Minimap
               </label>
             </div>
              <div class="setting-item">
                 <label>
                   <input type="checkbox" id="line-numbers-toggle">
                   Show Line Numbers
                 </label>
               </div>
              <div class="setting-item">
                <label>Tab Size:</label>
                <select id="tab-size-input">
                  <option value="2">2 spaces</option>
                  <option value="4">4 spaces</option>
                  <option value="8">8 spaces</option>
                </select>
              </div>
            </div>
            
            <div class="settings-section">
              <h4>Keyboard Shortcuts</h4>
              <div class="shortcut-item">
                <span>Run code:</span>
                <kbd>Ctrl+R</kbd>
              </div>
              <div class="shortcut-item">
                <span>New tab:</span>
                <kbd>Ctrl+T</kbd>
              </div>
              <div class="shortcut-item">
                <span>Save:</span>
                <kbd>Ctrl+S</kbd>
              </div>
              <div class="shortcut-item">
                <span>Settings:</span>
                <kbd>Ctrl+,</kbd>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
